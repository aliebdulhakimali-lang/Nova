<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVASTYLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0b;
            --card: #121214;
            --gold: #D4AF37;
            --text: #ffffff;
            --gray: #98989D;
            --border: rgba(255,255,255,0.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .topbar {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%); width: 94%; max-width: 500px;
            background: rgba(18,18,20,0.85); backdrop-filter: blur(25px); border: 1px solid var(--border);
            border-radius: 40px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 20px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold), #E5C158); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .topbar-icons { display: flex; gap: 16px; color: var(--gray); font-size: 16px; align-items: center; }
        .hero {
            padding: 120px 20px 40px; text-align: center; max-width: 600px; margin: 0 auto;
        }
        .hero-badge {
            display: inline-block; background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3);
            padding: 6px 18px; border-radius: 50px; font-size: 12px; color: var(--gold); letter-spacing: 1px; margin-bottom: 20px;
        }
        .hero h1 { font-size: 36px; font-weight: 900; line-height: 1.3; margin-bottom: 12px; }
        .hero h1 span { background: linear-gradient(135deg, var(--gold), #E5C158); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--gray); font-size: 15px; max-width: 350px; margin: 0 auto 30px; }
        .section-title {
            text-align: center; font-size: 22px; font-weight: 700; margin: 10px 0 24px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .section-title::after, .section-title::before { content: ''; flex:1; height: 1px; background: var(--border); max-width: 40px; }
        .products { padding: 20px; max-width: 600px; margin: 0 auto; }
        .product-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            margin-bottom: 16px; overflow: hidden; transition: all 0.3s;
        }
        .product-card:active { transform: scale(0.98); }
        .product-img { width: 100%; height: 220px; object-fit: cover; background: #1a1a1e; }
        .product-body { padding: 16px 18px; }
        .product-cat { font-size: 11px; color: var(--gold); letter-spacing: 1px; margin-bottom: 4px; }
        .product-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .product-price-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .price { font-size: 22px; font-weight: 900; color: var(--gold); }
        .old-price { font-size: 14px; color: var(--gray); text-decoration: line-through; margin-right: 8px; }
        .btn-order {
            background: #25D366; color: #fff; border: none; padding: 12px 24px; border-radius: 30px;
            font-weight: 700; font-family: 'Cairo', sans-serif; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
        .empty-state i { font-size: 50px; margin-bottom: 16px; color: var(--gold); opacity: 0.5; }
        footer {
            text-align: center; padding: 30px 20px; color: var(--gray); font-size: 12px;
            border-top: 1px solid var(--border); margin-top: 20px;
        }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
            align-items: flex-end; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1c1c1e; border-radius: 24px 24px 0 0; padding: 30px 24px;
            width: 100%; max-width: 500px; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-content h3 { text-align: center; margin-bottom: 24px; font-size: 20px; }
        .modal-content input {
            width: 100%; padding: 14px 16px; margin-bottom: 12px; background: #121214;
            border: 1px solid #2c2c2e; border-radius: 14px; color: #fff; font-family: 'Cairo', sans-serif; font-size: 15px;
        }
        .btn-confirm {
            width: 100%; background: var(--gold); color: #000; border: none; padding: 16px;
            border-radius: 30px; font-weight: 700; font-size: 16px; font-family: 'Cairo', sans-serif; cursor: pointer; margin-top: 8px;
        }
        .btn-cancel {
            width: 100%; background: transparent; color: var(--gray); border: none; padding: 12px;
            font-size: 14px; cursor: pointer; font-family: 'Cairo', sans-serif; margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo" id="storeNameTop">NOVASTYLE</div>
        <div class="topbar-icons">
            <i class="far fa-heart"></i>
            <i class="far fa-user"></i>
        </div>
    </div>

    <div class="hero">
        <div class="hero-badge">✦ العلامة التجارية</div>
        <h1>أناقة <span>عصرية</span> بلا حدود</h1>
        <p id="heroDescText">ساعات، عطور، إكسسوارات، نظارات وإلكترونيات</p>
    </div>

    <div class="products">
        <div class="section-title"><span>المجموعة</span></div>
        <div id="productsContainer"></div>
    </div>

    <footer>
        <p>© 2026 <span id="footerStoreName">NOVASTYLE</span>. تطوير <strong>علي عبد الحكيم</strong></p>
        <p style="margin-top:4px;">واتساب: <span id="footerPhone">967735846986</span></p>
    </footer>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3>📲 إتمام الطلب عبر واتساب</h3>
            <input type="text" id="custName" placeholder="الاسم الكامل">
            <input type="tel" id="custPhone" placeholder="رقم الهاتف">
            <button class="btn-confirm" id="confirmOrderBtn"><i class="fab fa-whatsapp"></i> إرسال الطلب</button>
            <button class="btn-cancel" onclick="closeOrderModal()">إلغاء</button>
        </div>
    </div>

    <script>
        let storeData = {
            settings: { storeName: "NOVASTYLE", whatsapp: "967735846986", heroDescription: "ساعات، عطور، إكسسوارات، نظارات وإلكترونيات", primaryColor: "#D4AF37" },
            products: []
        };

        // 1. جلب من localStorage (تحديث حي من لوحة التحكم)
        const live = localStorage.getItem('novastyle_live_data');
        if (live) { storeData = JSON.parse(live); }
        // 2. وإلا جلب من data.json
        else {
            fetch('data.json')
                .then(r => r.json())
                .then(d => { storeData = d; renderStore(); })
                .catch(() => renderStore());
        }

        function renderStore() {
            document.getElementById('storeNameTop').textContent = storeData.settings.storeName;
            document.getElementById('heroDescText').textContent = storeData.settings.heroDescription;
            document.getElementById('footerStoreName').textContent = storeData.settings.storeName;
            document.getElementById('footerPhone').textContent = storeData.settings.whatsapp;
            document.documentElement.style.setProperty('--gold', storeData.settings.primaryColor);
            const c = document.getElementById('productsContainer');
            if (!storeData.products.length) {
                c.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>لا توجد منتجات بعد</p></div>`;
                return;
            }
            c.innerHTML = storeData.products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" class="product-img" onerror="this.style.background='#1a1a1e'">
                    <div class="product-body">
                        <div class="product-cat">${p.category}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price-row">
                            <div><span class="price">${p.price} ر.س</span>${p.oldPrice?`<span class="old-price">${p.oldPrice} ر.س</span>`:''}</div>
                            <button class="btn-order" onclick="openOrderModal(${p.id})"><i class="fab fa-whatsapp"></i> اطلب</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        let curId = null;
        function openOrderModal(id) { curId=id; document.getElementById('orderModal').classList.add('active'); }
        function closeOrderModal() { document.getElementById('orderModal').classList.remove('active'); }
        document.getElementById('confirmOrderBtn').addEventListener('click', ()=>{
            const n=document.getElementById('custName').value.trim(), ph=document.getElementById('custPhone').value.trim();
            if(!n||!ph) return alert('الرجاء إدخال الاسم ورقم الهاتف');
            const pr=storeData.products.find(x=>x.id===curId);
            if(!pr) return;
            const msg = `مرحباً ${storeData.settings.storeName}،\nأرغب في طلب:\n\n🛍 ${pr.name}\n💰 ${pr.price} ر.س\n📷 ${pr.image}\n\n👤 الاسم: ${n}\n📞 الهاتف: ${ph}`;
            window.open(`https://wa.me/${storeData.settings.whatsapp}?text=${encodeURIComponent(msg)}`,'_blank');
            closeOrderModal();
            document.getElementById('custName').value=''; document.getElementById('custPhone').value='';
        });

        // استماع للتحديثات من لوحة التحكم (كل 3 ثوان)
        setInterval(() => {
            const liveUpdate = localStorage.getItem('novastyle_live_data');
            if (liveUpdate) {
                const newData = JSON.parse(liveUpdate);
                if (JSON.stringify(newData) !== JSON.stringify(storeData)) {
                    storeData = newData;
                    renderStore();
                }
            }
        }, 3000);

        renderStore();
    </script>
</body>
</html>
